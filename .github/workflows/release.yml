name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.build }}
    runs-on: ${{ matrix.os }}
    env:
      BUILD_NAME: "magi-${{ github.ref_name }}-${{ matrix.target }}"
    strategy:
      fail-fast: false
      matrix:
        build: [linux-x86, linux-x86-musl, linux-aarch64, darwin-x86, darwin-aarch64]
        include:
          - build: linux-x86
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - build: linux-x86-musl
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - build: linux-aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - build: darwin-x86
            os: macos-15-intel
            target: x86_64-apple-darwin
          - build: darwin-aarch64
            os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - uses: cachix/cachix-action@v15
        with:
          name: nix-community
          skipPush: true

      - name: Build release binary
        run: nix develop --command cargo build --verbose --release --target ${{ matrix.target }}

      - name: Bundle release
        shell: bash
        run: |
          mkdir -p "$BUILD_NAME"
          cp README.md LICENSE "$BUILD_NAME/"
          cp "target/${{ matrix.target }}/release/magi" "$BUILD_NAME/"
          tar -czf "${BUILD_NAME}.tar.gz" "$BUILD_NAME"
          openssl dgst -sha256 -r "${BUILD_NAME}.tar.gz" | awk '{print $1}' > "${BUILD_NAME}.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUILD_NAME }}
          path: |
            ${{ env.BUILD_NAME }}.tar.gz
            ${{ env.BUILD_NAME }}.tar.gz.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  BINARY_NAME: magi

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - uses: cachix/cachix-action@v15
        with:
          name: nix-community
          skipPush: true

      - name: Build x86_64-unknown-linux-gnu
        run: nix build .#magi -o result-x86_64-linux

      - name: Build aarch64-unknown-linux-gnu
        run: nix build .#magi-aarch64-linux -o result-aarch64-linux

      - name: Package artifacts
        run: |
          TAG="${{ github.ref_name }}"

          X86_ARCHIVE="${{ env.BINARY_NAME }}-${TAG}-x86_64-unknown-linux-gnu.tar.gz"
          tar -C result-x86_64-linux/bin -czf "$X86_ARCHIVE" "${{ env.BINARY_NAME }}"
          sha256sum "$X86_ARCHIVE" > "${X86_ARCHIVE}.sha256"

          AARCH64_ARCHIVE="${{ env.BINARY_NAME }}-${TAG}-aarch64-unknown-linux-gnu.tar.gz"
          tar -C result-aarch64-linux/bin -czf "$AARCH64_ARCHIVE" "${{ env.BINARY_NAME }}"
          sha256sum "$AARCH64_ARCHIVE" > "${AARCH64_ARCHIVE}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: "*.tar.gz*"

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - uses: cachix/cachix-action@v15
        with:
          name: nix-community
          skipPush: true

      - name: Build aarch64-apple-darwin
        run: nix build .#magi -o result-aarch64-darwin

      - name: Build x86_64-apple-darwin
        run: nix build .#magi-x86_64-darwin -o result-x86_64-darwin

      - name: Package artifacts
        run: |
          TAG="${{ github.ref_name }}"

          AARCH64_ARCHIVE="${{ env.BINARY_NAME }}-${TAG}-aarch64-apple-darwin.tar.gz"
          tar -C result-aarch64-darwin/bin -czf "$AARCH64_ARCHIVE" "${{ env.BINARY_NAME }}"
          shasum -a 256 "$AARCH64_ARCHIVE" > "${AARCH64_ARCHIVE}.sha256"

          X86_ARCHIVE="${{ env.BINARY_NAME }}-${TAG}-x86_64-apple-darwin.tar.gz"
          tar -C result-x86_64-darwin/bin -czf "$X86_ARCHIVE" "${{ env.BINARY_NAME }}"
          shasum -a 256 "$X86_ARCHIVE" > "${X86_ARCHIVE}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: "*.tar.gz*"

  release:
    name: Create Release
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

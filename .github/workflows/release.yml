name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  check-version:
    name: Verify Cargo.toml version matches tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check version
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Cargo.toml version ($CARGO_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "OK: version $CARGO_VERSION matches tag"

  build-linux:
    name: Build ${{ matrix.build }}
    needs: check-version
    runs-on: ubuntu-latest
    env:
      BUILD_NAME: "magi-${{ github.ref_name }}-${{ matrix.target }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - build: linux-x86
            target: x86_64-unknown-linux-gnu
            nix_attr: magi
          - build: linux-x86-musl
            target: x86_64-unknown-linux-musl
            nix_attr: magi-x86_64-linux-musl
          - build: linux-aarch64
            target: aarch64-unknown-linux-gnu
            nix_attr: magi-aarch64-linux

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - uses: cachix/cachix-action@v15
        with:
          name: nix-community
          skipPush: true

      - name: Build
        run: nix build .#${{ matrix.nix_attr }} -o result

      - name: Bundle release
        run: |
          mkdir -p "$BUILD_NAME"
          cp README.md LICENSE "$BUILD_NAME/"
          cp result/bin/magi "$BUILD_NAME/"
          tar -czf "${BUILD_NAME}.tar.gz" "$BUILD_NAME"
          openssl dgst -sha256 -r "${BUILD_NAME}.tar.gz" | awk '{print $1}' > "${BUILD_NAME}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUILD_NAME }}
          path: |
            ${{ env.BUILD_NAME }}.tar.gz
            ${{ env.BUILD_NAME }}.tar.gz.sha256

  build-darwin:
    name: Build ${{ matrix.build }}
    needs: check-version
    runs-on: ${{ matrix.os }}
    env:
      BUILD_NAME: "magi-${{ github.ref_name }}-${{ matrix.target }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - build: darwin-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            binary_path: target/release/magi
          - build: darwin-x86
            os: macos-15-intel
            target: x86_64-apple-darwin
            cargo_flags: --target=x86_64-apple-darwin
            binary_path: target/x86_64-apple-darwin/release/magi

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release --locked ${{ matrix.cargo_flags }}

      - name: Bundle release
        run: |
          mkdir -p "$BUILD_NAME"
          cp README.md LICENSE "$BUILD_NAME/"
          cp "${{ matrix.binary_path }}" "$BUILD_NAME/"
          tar -czf "${BUILD_NAME}.tar.gz" "$BUILD_NAME"
          openssl dgst -sha256 -r "${BUILD_NAME}.tar.gz" | awk '{print $1}' > "${BUILD_NAME}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUILD_NAME }}
          path: |
            ${{ env.BUILD_NAME }}.tar.gz
            ${{ env.BUILD_NAME }}.tar.gz.sha256

  release:
    name: Create Release
    needs: [build-linux, build-darwin]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

  update-homebrew:
    name: Update Homebrew formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Clone tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: gh repo clone anddani/homebrew-magi

      - name: Update formula
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          SHA_DARWIN_ARM=$(cat "artifacts/magi-${TAG}-aarch64-apple-darwin.tar.gz.sha256")
          SHA_DARWIN_X86=$(cat "artifacts/magi-${TAG}-x86_64-apple-darwin.tar.gz.sha256")
          SHA_LINUX_ARM=$(cat "artifacts/magi-${TAG}-aarch64-unknown-linux-gnu.tar.gz.sha256")
          SHA_LINUX_X86=$(cat "artifacts/magi-${TAG}-x86_64-unknown-linux-gnu.tar.gz.sha256")
          echo "darwin-aarch64: $SHA_DARWIN_ARM"
          echo "darwin-x86: $SHA_DARWIN_X86"
          echo "linux-aarch64: $SHA_LINUX_ARM"
          echo "linux-x86: $SHA_LINUX_X86"

          FORMULA="homebrew-magi/Formula/magi.rb"
          sed -i "s/version \"[^\"]*\"/version \"${VERSION}\"/" "$FORMULA"
          sed -i "/aarch64-apple-darwin/{n; s/sha256 \"[^\"]*\"/sha256 \"${SHA_DARWIN_ARM}\"/}" "$FORMULA"
          sed -i "/x86_64-apple-darwin/{n; s/sha256 \"[^\"]*\"/sha256 \"${SHA_DARWIN_X86}\"/}" "$FORMULA"
          sed -i "/aarch64-unknown-linux/{n; s/sha256 \"[^\"]*\"/sha256 \"${SHA_LINUX_ARM}\"/}" "$FORMULA"
          sed -i "/x86_64-unknown-linux/{n; s/sha256 \"[^\"]*\"/sha256 \"${SHA_LINUX_X86}\"/}" "$FORMULA"

      - name: Commit and push
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          cd homebrew-magi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/magi.rb
          git commit -m "Bump magi to ${GITHUB_REF_NAME#v}"
          git push

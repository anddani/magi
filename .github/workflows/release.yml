name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build-linux:
    name: Build ${{ matrix.build }}
    runs-on: ubuntu-latest
    env:
      BUILD_NAME: "magi-${{ github.ref_name }}-${{ matrix.target }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - build: linux-x86
            target: x86_64-unknown-linux-gnu
            nix_attr: magi
          - build: linux-x86-musl
            target: x86_64-unknown-linux-musl
            nix_attr: magi-x86_64-linux-musl
          - build: linux-aarch64
            target: aarch64-unknown-linux-gnu
            nix_attr: magi-aarch64-linux

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - uses: cachix/cachix-action@v15
        with:
          name: nix-community
          skipPush: true

      - name: Build
        run: nix build .#${{ matrix.nix_attr }} -o result

      - name: Bundle release
        run: |
          mkdir -p "$BUILD_NAME"
          cp README.md LICENSE "$BUILD_NAME/"
          cp result/bin/magi "$BUILD_NAME/"
          tar -czf "${BUILD_NAME}.tar.gz" "$BUILD_NAME"
          openssl dgst -sha256 -r "${BUILD_NAME}.tar.gz" | awk '{print $1}' > "${BUILD_NAME}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUILD_NAME }}
          path: |
            ${{ env.BUILD_NAME }}.tar.gz
            ${{ env.BUILD_NAME }}.tar.gz.sha256

  build-darwin:
    name: Build ${{ matrix.build }}
    runs-on: ${{ matrix.os }}
    env:
      BUILD_NAME: "magi-${{ github.ref_name }}-${{ matrix.target }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - build: darwin-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            binary_path: target/release/magi
          - build: darwin-x86
            os: macos-15-intel
            target: x86_64-apple-darwin
            cargo_flags: --target=x86_64-apple-darwin
            binary_path: target/x86_64-apple-darwin/release/magi

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release --locked ${{ matrix.cargo_flags }}

      - name: Bundle release
        run: |
          mkdir -p "$BUILD_NAME"
          cp README.md LICENSE "$BUILD_NAME/"
          cp "${{ matrix.binary_path }}" "$BUILD_NAME/"
          tar -czf "${BUILD_NAME}.tar.gz" "$BUILD_NAME"
          openssl dgst -sha256 -r "${BUILD_NAME}.tar.gz" | awk '{print $1}' > "${BUILD_NAME}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUILD_NAME }}
          path: |
            ${{ env.BUILD_NAME }}.tar.gz
            ${{ env.BUILD_NAME }}.tar.gz.sha256

  release:
    name: Create Release
    needs: [build-linux, build-darwin]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

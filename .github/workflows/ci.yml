name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - uses: cachix/cachix-action@v15
        with:
          name: nix-community
          skipPush: true

      - name: Check formatting
        run: nix develop --command cargo fmt --check

      - name: Clippy
        run: nix develop --command cargo clippy -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - uses: cachix/cachix-action@v15
        with:
          name: nix-community
          skipPush: true

      - name: Test
        run: nix develop --command cargo test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - uses: cachix/cachix-action@v15
        with:
          name: nix-community
          skipPush: true

      - name: Build
        run: nix develop --command cargo build

  coverage:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage
        run: cargo llvm-cov --workspace --json --summary-only --output-path coverage.json

      - name: Render coverage report
        run: |
          jq -r '
            def pct(s): "\(s.percent * 100 | round / 100)%";
            def icon(s): if s.percent >= 80 then "🟢" elif s.percent >= 50 then "🟡" else "🔴" end;
            .data[0] as $d | $d.totals as $t |
            "## Coverage report",
            "",
            "\(icon($t.lines)) **\(pct($t.lines)) line coverage** (\($t.lines.covered)/\($t.lines.count) lines)",
            "",
            "|  | Coverage | Covered | Total |",
            "| --- | ---: | ---: | ---: |",
            "| Lines | \(pct($t.lines)) | \($t.lines.covered) | \($t.lines.count) |",
            "| Functions | \(pct($t.functions)) | \($t.functions.covered) | \($t.functions.count) |",
            "| Regions | \(pct($t.regions)) | \($t.regions.covered) | \($t.regions.count) |",
            "",
            "<details>",
            "<summary>Per-file coverage</summary>",
            "",
            "| File | Lines | Functions | Regions |",
            "| --- | ---: | ---: | ---: |",
            ($d.files[] |
              "| `\(.filename | ltrimstr(env.GITHUB_WORKSPACE + "/"))` | \(icon(.summary.lines)) \(pct(.summary.lines)) | \(pct(.summary.functions)) | \(pct(.summary.regions)) |"),
            "",
            "</details>"
          ' coverage.json > coverage.md

          cat coverage.md >> "$GITHUB_STEP_SUMMARY"

      - name: Post coverage comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage
          path: coverage.md
